name: Daily IndexNow refresh

on:
  schedule:
    - cron: "30 3 * * *"   # 每天 03:30 UTC 通知 Bing/Yandex 重新抓取(freshness 訊號)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: indexnow
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Submit all sitemap URLs to IndexNow
        run: |
          python3 - <<'PY'
          import json, os, re, urllib.request, urllib.error
          HOST = "alice51849.github.io"
          SITE = "https://alice51849.github.io/ios-app-guide"
          # IndexNow key = 檔名去 .txt(該檔已 host 於站台根)
          keyfiles = [f for f in os.listdir(".") if re.fullmatch(r"[a-f0-9]{32}\.txt", f)]
          assert keyfiles, "找不到 IndexNow key 檔"
          KEY = keyfiles[0][:-4]

          def locs(path):
              if not os.path.exists(path):
                  return []
              with open(path, encoding="utf-8") as f:
                  return re.findall(r"<loc>([^<]+)</loc>", f.read())

          sitemaps = []
          for loc in locs("sitemap_index.xml"):
              name = loc.rstrip("/").split("/")[-1]
              if name.endswith(".xml"):
                  sitemaps.append(name)
          if not sitemaps:
              sitemaps = ["sitemap.xml"]

          urls, seen = [], set()
          for sm in sitemaps:
              for u in locs(sm):
                  if u not in seen:
                      seen.add(u); urls.append(u)
          print(f"key={KEY[:8]}… sitemaps={len(sitemaps)} urls={len(urls)}")

          def submit(chunk):
              payload = json.dumps({"host": HOST, "key": KEY,
                                    "keyLocation": f"{SITE}/{KEY}.txt",
                                    "urlList": chunk}).encode()
              for ep in ("https://api.indexnow.org/indexnow", "https://www.bing.com/indexnow"):
                  req = urllib.request.Request(ep, data=payload,
                        headers={"Content-Type": "application/json; charset=utf-8"})
                  try:
                      with urllib.request.urlopen(req, timeout=90) as r:
                          print(f"  {ep} -> {r.status}")
                  except urllib.error.HTTPError as e:
                      print(f"  {ep} -> HTTP {e.code}")
                  except Exception as e:  # noqa: BLE001
                      print(f"  {ep} -> {str(e)[:80]}")

          for i in range(0, len(urls), 10000):
              submit(urls[i:i+10000])
          print("done")
          PY
