uted{color:var(--muted)}.pill{display:inline-block;border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 10px;margin:3px;font-weight:700}.checklist li{margin:.45em 0}.footer{margin-top:40px;padding:28px 0;border-top:1px solid var(--line);color:var(--muted);font-size:.92rem}.notice{font-size:.92rem;color:#626875}.print-sheet{background:#fff;color:#111;border:1px solid #ddd;padding:22px;border-radius:16px}.trace{font-size:54px;letter-spacing:8px;color:#111;margin:10px 0 20px}.trace span{color:#c9c9c9}@media print{body{background:white}.top,.hero,.no-print,.footer,.card:not(.printable){display:none!important}.printable{display:block!important;border:0;box-shadow:none}.wrap{width:100%;}.print-sheet{border:0}.trace{font-size:62px}}
</style><script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "inLanguage": "ja", "mainEntity": [{"@type": "Question", "name": "印刷できる練習プリント作成", "acceptedAnswer": {"@type": "Answer", "text": "Crea fichas para Zhuyin/Bopomofo, fonética ABC o números e imprímelas."}}]}</script></head><body><header class="top no-print"><div class="wrap nav"><a href="https://alice51849.github.io/ios-app-guide/ja/index.html">iOS App Guide</a><nav><a href="https://alice51849.github.io/ios-app-guide/ja/tools/">無料ツール</a> · <a href="https://alice51849.github.io/ios-app-guide/ja/alternatives/">代替アプリ</a></nav></div></header><main><section class="hero wrap no-print"><h1>印刷できる練習プリント作成</h1><p class="lead">Crea fichas para Zhuyin/Bopomofo, fonética ABC o números e imprímelas.</p></section><section class="wrap grid"><div class="card side no-print"><label>練習タイプ<select id="practiceType"><option value="zhuyin">Zhuyin / Bopomofo</option><option value="abc">ABC phonics</option><option value="numbers">Numbers</option></select></label><label>行数<input id="rowCount" type="number" value="8"></label><p><button id="practiceBtn">プリントを作成</button></p><p><button class="ghost" id="printBtn">印刷</button></p></div><div class="card two printable"><div id="sheet"></div></div></section></main><script>const sets={zhuyin:["ㄅ","ㄆ","ㄇ","ㄈ","ㄉ","ㄊ","ㄋ","ㄌ"],abc:["A a","B b","C c","D d","E e","F f"],numbers:["0","1","2","3","4","5"]};function build(){let items=sets[practiceType.value],rows=[];for(let i=0;i<parseInt(rowCount.value||8);i++){let ch=items[i%items.length];rows.push(`<div class="trace"><span>${ch}</span> ${ch} <span>${ch}</span> ___ ___</div>`)}sheet.innerHTML=`<div class="print-sheet"><h1>印刷できる練習プリント作成</h1><p>名前: __________ 日付: ________</p>${rows.join("")}<p>Repasa el símbolo gris, dilo en voz alta y luego escríbelo solo.</p></div>`}practiceBtn.onclick=build;printBtn.onclick=()=>window.print();build();</script><footer class="footer no-print"><div class="wrap">ブラウザ内で動く無料ツールです。追跡なし、アカウント不要、サーバー送信なし。結果は参考情報です。</div></footer></body></html>
